<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyBlock Bazaar</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#16161a;--panel:#2b2b2f;--panel2:#363639;--slot:#101013;
  --lt:#545458;--dk:#09090b;--text:#ffffff;--muted:#aaaaaa;--muted2:#666669;
  --gold:#ffaa00;--gold-dk:#995f00;--green:#55ff55;--green-dk:#007700;
  --red:#ff5555;--red-dk:#770000;--aqua:#55ffff;--blue:#5599ff;
  --purple:#bb55ff;--yellow:#ffff55;
}
body{font-family:'VT323',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:44px 16px 64px;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:16px 16px;}
.wrap{width:100%;max-width:700px}
.mc-panel{background:var(--panel);border:3px solid;border-color:var(--lt) var(--dk) var(--dk) var(--lt);position:relative;}
.mc-panel::after{content:'';position:absolute;inset:0;border:1px solid;border-color:rgba(255,255,255,.06) rgba(0,0,0,.25) rgba(0,0,0,.25) rgba(255,255,255,.06);pointer-events:none;}
.mc-slot{background:var(--slot);border:3px solid;border-color:var(--dk) var(--lt) var(--lt) var(--dk);}
.mc-slot::after{content:'';position:absolute;inset:0;border:1px solid;border-color:rgba(0,0,0,.3) rgba(255,255,255,.05) rgba(255,255,255,.05) rgba(0,0,0,.3);pointer-events:none;}
.header{margin-bottom:20px;text-align:center}
.header h1{font-family:'Press Start 2P',monospace;font-size:20px;line-height:1.5;color:var(--gold);text-shadow:3px 3px 0 var(--gold-dk),0 0 40px rgba(255,170,0,.25);letter-spacing:.02em;}
.header h1 em{color:#fff;font-style:normal}
.header p{font-size:18px;color:var(--muted2);margin-top:8px;letter-spacing:.08em}
#status{font-size:17px;color:var(--muted2);margin-bottom:10px;display:flex;align-items:center;gap:8px;min-height:22px;}
.dot{width:8px;height:8px;flex-shrink:0;background:var(--gold);animation:blink 1s steps(1) infinite}
.dot.ok{background:var(--green);animation:none}
.dot.err{background:var(--red);animation:none}
@keyframes blink{50%{opacity:0}}
.market-panel{margin-bottom:16px;overflow:hidden;}
.market-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.2);border-bottom:2px solid var(--dk);cursor:pointer;user-select:none;}
.market-header:hover{background:rgba(255,170,0,.03)}
.market-title{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);letter-spacing:.1em;display:flex;align-items:center;gap:8px;}
.market-toggle{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted2);}
.market-body{display:grid;grid-template-columns:1fr 1fr;}
.market-col{padding:10px 14px;border-right:1px solid var(--dk);}
.market-col:last-child{border-right:none}
.market-col-title{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:.09em;margin-bottom:8px;}
.market-col-title.up{color:var(--green)}.market-col-title.down{color:var(--red)}.market-col-title.vol{color:var(--aqua)}
.market-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.2);cursor:pointer;font-size:16px;}
.market-row:last-child{border-bottom:none}
.market-row:hover .mrow-name{color:var(--gold)}
.mrow-name{color:var(--text);display:flex;align-items:center;gap:6px}
.mrow-dot{width:8px;height:8px;flex-shrink:0}
.mrow-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.mrow-val.up{color:var(--green)}.mrow-val.down{color:var(--red)}.mrow-val.vol{color:var(--aqua)}
.market-loading{padding:18px;text-align:center;color:var(--muted2);font-size:17px;animation:blink 1s steps(1) infinite;}
.compare-bar{margin-bottom:16px;overflow:hidden;}
.compare-bar-inner{padding:10px 16px;display:flex;align-items:center;gap:10px;background:rgba(85,153,255,.07);border-bottom:2px solid #334488;}
.compare-label{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--blue);letter-spacing:.08em;flex-shrink:0;}
.compare-slots{display:flex;gap:8px;flex:1;flex-wrap:wrap;}
.compare-chip{display:flex;align-items:center;gap:6px;padding:3px 8px;background:rgba(85,153,255,.12);border:1px solid #334488;font-size:15px;cursor:pointer;}
.compare-chip:hover{background:rgba(255,85,85,.12);border-color:#770000}
.compare-go{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 10px;background:rgba(85,153,255,.15);border:2px solid #334488;color:var(--blue);cursor:pointer;white-space:nowrap;}
.compare-go:hover{background:rgba(85,153,255,.3);color:#fff}
.compare-go:disabled{opacity:.4;cursor:not-allowed}
.search-wrap{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--slot);border:3px solid;border-color:var(--dk) var(--lt) var(--lt) var(--dk);color:var(--text);font-family:'VT323',monospace;font-size:22px;padding:10px 16px;outline:none;letter-spacing:.04em;transition:border-color .1s;}
.search-input:focus{border-color:var(--gold-dk) var(--gold) var(--gold) var(--gold-dk)}
.search-input::placeholder{color:var(--muted2)}
.search-input:disabled{opacity:.4;cursor:not-allowed}
.dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--panel2);border:3px solid;border-color:var(--lt) var(--dk) var(--dk) var(--lt);z-index:200;max-height:300px;overflow-y:auto;}
.dropdown::-webkit-scrollbar{width:6px;background:var(--slot)}
.dropdown::-webkit-scrollbar-thumb{background:var(--lt)}
.dd-item{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.4);font-size:19px;transition:background .05s;}
.dd-item:hover,.dd-item.active{background:rgba(255,170,0,.09)}
.dd-item .dname{color:var(--text);display:flex;align-items:center;gap:8px}
.dd-item .dprice{color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:12px}
.dd-px{width:10px;height:10px;flex-shrink:0}
.dd-empty{padding:14px;text-align:center;color:var(--muted2);font-size:18px}
.dd-right{display:flex;align-items:center;gap:6px}
.dd-type{font-family:'Press Start 2P',monospace;font-size:6px;padding:2px 6px;letter-spacing:.06em;flex-shrink:0;}
.dd-bz{background:rgba(85,255,85,.1);color:var(--green);border:1px solid var(--green-dk)}
.dd-ah{background:rgba(85,153,255,.1);color:var(--blue);border:1px solid #334488}
.card{overflow:hidden;animation:rise .12s steps(3) forwards}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card-head{padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:2px solid var(--dk);background:rgba(0,0,0,.2);}
.card-head-left{flex:1;min-width:0}
.item-name{font-size:28px;line-height:1.1;color:var(--gold);text-shadow:2px 2px 0 var(--gold-dk);letter-spacing:.03em;}
.item-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);margin-top:4px}
.card-head-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.live-tag{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--green);border:2px solid var(--green-dk);padding:5px 8px;background:rgba(85,255,85,.06);letter-spacing:.12em;animation:blink 2s steps(1) infinite;}
.ah-tag{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--blue);border:2px solid #334488;padding:5px 8px;background:rgba(85,153,255,.06);letter-spacing:.12em;}
.add-compare-btn{font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 8px;background:none;border:1px solid #334488;color:var(--blue);cursor:pointer;white-space:nowrap;}
.add-compare-btn:hover{background:rgba(85,153,255,.12)}
.add-compare-btn.added{border-color:var(--green-dk);color:var(--green);background:rgba(85,255,85,.06)}
.tabs{display:flex;border-bottom:2px solid var(--dk);background:rgba(0,0,0,.15);overflow-x:auto;}
.tabs::-webkit-scrollbar{height:0}
.tab-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:10px 14px;background:none;border:none;color:var(--muted2);cursor:pointer;letter-spacing:.05em;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .1s;white-space:nowrap;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(255,170,0,.04)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.price-grid{display:grid;grid-template-columns:1fr 1fr}
.price-col{padding:18px 20px}
.price-col.sell{border-right:1px solid var(--dk)}
.col-label{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.price-col.sell .col-label{color:var(--red)}
.price-col.buy  .col-label{color:var(--green)}
.col-dot{width:8px;height:8px;flex-shrink:0}
.price-col.sell .col-dot{background:var(--red)}
.price-col.buy  .col-dot{background:var(--green)}
.price-row{margin-bottom:14px}
.price-row:last-child{margin-bottom:0}
.plabel{font-size:15px;color:var(--muted);line-height:1}
.pvalue{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--text);line-height:1;margin-top:2px;}
.pvalue .coin{font-size:12px;color:var(--gold);font-family:'VT323',monospace;font-weight:400;margin-left:3px}
.ptag{display:inline-block;font-family:'VT323',monospace;font-size:13px;padding:1px 7px;margin-top:3px;letter-spacing:.04em;}
.ptag-i{background:rgba(85,99,255,.18);color:#aaaaff;border:1px solid rgba(85,99,255,.3)}
.ptag-o{background:rgba(187,85,255,.18);color:#dd99ff;border:1px solid rgba(187,85,255,.3)}
.fill-strip{display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:10px 20px;border-top:1px solid var(--dk);background:rgba(0,0,0,.2);font-size:16px;}
.fill-label{color:var(--muted)}
.fill-val{color:var(--aqua);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.fill-val.gold{color:var(--gold)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);border-top:2px solid var(--dk);}
.stat-cell{padding:12px 8px;text-align:center;border-right:1px solid var(--dk);}
.stat-cell:last-child{border-right:none}
.slabel{font-size:11px;color:var(--muted2);letter-spacing:.07em;margin-bottom:4px}
.svalue{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.ah-price-grid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:2px solid var(--dk);}
.ah-cell{padding:18px 12px;text-align:center;border-right:1px solid var(--dk);}
.ah-cell:last-child{border-right:none}
.ah-cell .plabel{font-size:14px;color:var(--muted);margin-bottom:6px;}
.ah-cell .pvalue{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--text);}
.chart-section{padding:16px 20px 22px;border-top:1px solid rgba(255,255,255,.03)}
.section-title{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted2);letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.chart-wrap{position:relative;height:160px}
.period-toggle{display:flex;gap:4px}
.period-btn{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 10px;background:none;border:2px solid var(--lt);color:var(--muted2);cursor:pointer;letter-spacing:.04em;transition:all .1s;}
.period-btn.active{border-color:var(--gold-dk);color:var(--gold);background:rgba(255,170,0,.06)}
.period-btn:hover:not(.active){color:var(--text)}
.craft-section{padding:20px}
.craft-grid-area{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px;}
.craft-grid{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:3px;padding:8px;background:rgba(0,0,0,.25);border:2px solid var(--dk);}
.g-slot{width:60px;height:60px;position:relative;cursor:default;overflow:hidden;}
.g-slot.clickable{cursor:pointer;transition:filter .1s}
.g-slot.clickable:hover{filter:brightness(1.3)}
.g-slot.clickable:hover .slot-tip{display:block}
.slot-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1a1a1e;border:2px solid var(--lt);color:var(--gold);font-size:14px;white-space:nowrap;padding:2px 8px;z-index:100;pointer-events:none;}
.slot-abbr{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;line-height:1;text-align:center;}
.slot-qty{position:absolute;bottom:2px;right:3px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#fff;text-shadow:1px 1px 0 #000,0 0 4px #000;line-height:1;pointer-events:none;}
.craft-arrow{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted2);}
.craft-arrow svg{opacity:.7}
.craft-arrow span{font-size:13px;color:var(--muted)}
.out-slot{width:76px;height:76px;position:relative;cursor:pointer;transition:filter .1s;}
.out-slot:hover{filter:brightness(1.3)}
.ing-table{width:100%;border-collapse:collapse;font-size:17px}
.ing-table thead th{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted2);letter-spacing:.09em;text-align:left;padding:6px 8px;border-bottom:2px solid var(--dk);background:rgba(0,0,0,.2);}
.ing-table thead th.r{text-align:right}
.ing-table tbody td{padding:7px 8px;border-bottom:1px solid rgba(0,0,0,.3);vertical-align:middle;}
.ing-table tbody tr:last-child td{border-bottom:none}
.ing-table tfoot td{padding:8px;border-top:2px solid var(--dk);background:rgba(0,0,0,.2);}
.ing-table tbody tr.ing-row{cursor:pointer}
.ing-table tbody tr.ing-row:hover td{background:rgba(255,170,0,.06)}
.ing-table tbody tr.sub-row td{background:rgba(85,153,255,.025)}
.ing-table tbody tr.sub-row:hover td{background:rgba(85,153,255,.06)}
.ing-swatch{display:inline-block;width:12px;height:12px;vertical-align:middle;margin-right:8px;flex-shrink:0;}
.ing-name{color:var(--text)}
.ing-qty{color:var(--muted);font-size:15px}
.cell-r{text-align:right}
.price-i{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:14px}
.price-o{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:14px}
.price-na{color:var(--muted2);font-size:14px}
.fill-t{color:var(--aqua);font-family:'JetBrains Mono',monospace;font-size:13px}
.total-lbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted2);letter-spacing:.09em;}
.profit-box{margin-top:20px;background:rgba(0,0,0,.2);border:2px solid var(--dk);padding:16px}
.profit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.ps{padding:12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);position:relative}
.ps-lbl{font-size:13px;color:var(--muted);line-height:1.3;margin-bottom:8px}
.ps-val{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:600;line-height:1}
.ps-val.pos{color:var(--green)}.ps-val.neg{color:var(--red)}
.ps-pct{font-size:14px;color:var(--muted);margin-top:3px}
.ps-best{position:absolute;top:6px;right:8px;font-family:'Press Start 2P',monospace;font-size:5px;color:var(--yellow);border:1px solid rgba(255,255,85,.3);padding:2px 5px;background:rgba(255,255,85,.05);letter-spacing:.08em;}
.cpu-strip{display:flex;align-items:center;gap:18px;margin-top:14px;padding:10px 14px;background:rgba(255,170,0,.05);border:1px solid rgba(255,170,0,.15);}
.cpu-lbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);letter-spacing:.07em;}
.cpu-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--gold)}
.cpu-sep{color:var(--muted2);font-size:14px}
.expand-btn{font-family:'Press Start 2P',monospace;font-size:7px;background:none;border:1px solid var(--lt);color:var(--muted2);cursor:pointer;padding:2px 7px;margin-left:6px;vertical-align:middle;transition:all .1s;min-width:28px;text-align:center;}
.expand-btn:hover{border-color:var(--gold-dk);color:var(--gold)}
.expand-btn.open{border-color:var(--green-dk);color:var(--green)}
.expand-btn.none{border-color:var(--dk);color:var(--muted2);opacity:.35;cursor:default}
.sub-connector{color:var(--muted2);margin-right:4px;font-size:13px;font-family:'JetBrains Mono',monospace;}
.essence-section{padding:20px}
.essence-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px 16px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);}
.essence-icon{font-size:24px;flex-shrink:0}
.essence-meta{flex:1}
.essence-type{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:.08em;margin-bottom:4px;}
.essence-sub{font-size:15px;color:var(--muted2)}
.essence-bz-price{text-align:right}
.essence-bz-label{font-size:12px;color:var(--muted2);margin-bottom:2px}
.essence-bz-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--gold)}
.essence-table{width:100%;border-collapse:collapse;font-size:16px}
.essence-table thead th{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted2);letter-spacing:.08em;text-align:left;padding:7px 10px;border-bottom:2px solid var(--dk);background:rgba(0,0,0,.2);}
.essence-table thead th.r{text-align:right}
.essence-table tbody td{padding:8px 10px;border-bottom:1px solid rgba(0,0,0,.3);vertical-align:middle;}
.essence-table tbody tr:last-child td{border-bottom:none}
.essence-table tfoot td{padding:8px 10px;border-top:2px solid var(--dk);background:rgba(0,0,0,.2);}
.essence-table tbody tr.master-star-row td{background:rgba(187,85,255,.04)}
.essence-table tbody tr.conv-row td{background:rgba(85,153,255,.05)}
.star-cell{font-size:17px;letter-spacing:-1px;white-space:nowrap}
.star-plain{color:var(--muted2);opacity:.35}
.star-gold{color:var(--gold)}
.star-master{color:var(--purple)}
.ess-amt{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--aqua)}
.ess-cost-i{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--red)}
.ess-cost-o{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green)}
.ess-cum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.ess-req{font-size:13px;color:var(--muted2)}
.ess-note{padding:10px 16px;font-size:14px;color:var(--muted2);border-top:1px solid var(--dk);background:rgba(0,0,0,.15);line-height:1.5}
.dungeon-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;margin-bottom:14px;background:rgba(187,85,255,.08);border:1px solid rgba(187,85,255,.3);font-size:15px;color:var(--purple);}
.dungeon-badge span{font-family:'Press Start 2P',monospace;font-size:6px;}
.conv-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;margin-bottom:14px;background:rgba(85,153,255,.08);border:1px solid rgba(85,153,255,.3);font-size:15px;color:var(--blue);}
.conv-badge span{font-family:'Press Start 2P',monospace;font-size:6px;}
.floor-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;margin-bottom:14px;background:rgba(85,85,255,.08);border:1px solid rgba(85,85,255,.3);font-size:16px;color:var(--blue);}
.floor-badge span{font-family:'Press Start 2P',monospace;font-size:7px;}
.item-data-section{padding:20px}
.item-lore-box{background:rgba(0,0,0,.25);border:2px solid #550077;padding:14px 16px;margin-bottom:20px;font-size:18px;line-height:1.7;}
.lore-line{display:block}
.item-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--dk);border:1px solid var(--dk);margin-bottom:20px;}
.stat-box{background:var(--panel);padding:12px 14px;}
.stat-box-label{font-size:13px;color:var(--muted2);margin-bottom:4px}
.stat-box-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;}
.stat-box-val.pos{color:var(--green)}.stat-box-val.neg{color:var(--red)}
.req-list{margin-bottom:20px;}
.req-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,.3);font-size:17px;}
.req-item:last-child{border-bottom:none}

<script>
const WORKER   = 'https://solitary-lake-43dd.xxsweatapi.workers.dev';
const NEU_BASE = 'https://raw.githubusercontent.com/NotEnoughUpdates/NotEnoughUpdates-REPO/master/items/';

let products={}, items=[], sbAllItems=[], updated=null;
let currentId=null, currentTab='prices', chartInst=null;
let neuCache={}, ahPriceCache={}, activeIdx=-1;
let marketOpen=true, compareList=[];
let craftExpandState=new Map();
let craftCurrentId=null;

function isBazaar(id){return !!products[id];}
function tierColor(t){return({COMMON:'#ffffff',UNCOMMON:'#55ff55',RARE:'#5599ff',EPIC:'#bb55ff',LEGENDARY:'#ffaa00',MYTHIC:'#ff55ff',DIVINE:'#55ffff',SPECIAL:'#ff5555',VERY_SPECIAL:'#ff5555'})[t]||'#aaaaaa';}
function itemColor(id){
  if(!id)return'#333';const s=id.toUpperCase();
  if(s.includes('ENCHANTED'))return'#bb55ff';if(s.includes('DIAMOND'))return'#55ffff';
  if(s.includes('EMERALD'))return'#55ff55';if(s.includes('GOLD')||s.includes('GOLDEN'))return'#ffaa00';
  if(s.includes('IRON'))return'#aaaaaa';if(s.includes('NETHERITE'))return'#666';
  if(s.includes('REDSTONE'))return'#ff5555';if(s.includes('LAPIS'))return'#5599ff';
  if(s.includes('COAL'))return'#555';if(s.includes('NETHER_WART'))return'#dd3333';
  if(s.includes('NETHER_BRICK'))return'#993333';if(s.includes('QUARTZ'))return'#ffeeee';
  if(s.includes('SUGAR'))return'#ff88ee';if(s.includes('CANE'))return'#88ff44';
  if(s.includes('WHEAT')||s.includes('SEED'))return'#ffff55';if(s.includes('CARROT'))return'#ff8822';
  if(s.includes('POTATO'))return'#ddcc88';if(s.includes('MELON'))return'#ff5544';
  if(s.includes('PUMPKIN'))return'#ff7722';if(s.includes('MUSHROOM'))return'#cc8855';
  if(s.includes('CACTUS'))return'#55aa33';if(s.includes('SLIME'))return'#88ff55';
  if(s.includes('BONE'))return'#ddddaa';if(s.includes('ROTTEN')||s.includes('ZOMBIE'))return'#66aa33';
  if(s.includes('BLAZE'))return'#ffaa22';if(s.includes('SPIDER'))return'#886644';
  if(s.includes('ENDER'))return'#7744aa';if(s.includes('OBSIDIAN'))return'#330044';
  if(s.includes('ICE')||s.includes('SNOW'))return'#aaddff';if(s.includes('GRAVEL')||s.includes('FLINT'))return'#999';
  if(s.includes('SAND'))return'#ddcc99';if(s.includes('LOG')||s.includes('WOOD'))return'#8B6431';
  if(s.includes('LEATHER'))return'#aa7744';if(s.includes('FEATHER'))return'#eeeedd';
  if(s.includes('ESSENCE'))return'#aa44ff';
  let h=5381;for(let i=0;i<s.length;i++)h=(((h<<5)+h)^s.charCodeAt(i))>>>0;
  return['#5588ff','#55ffaa','#ffaa55','#ff55aa','#aaff55','#55aaff','#dd99ff'][h%7];
}
function getAbbr(id){const w=id.replace(/:/g,'_').split('_').filter(w=>w&&w!=='0'&&isNaN(w));if(!w.length)return'??';if(w.length===1)return w[0].slice(0,3).toUpperCase();if(w.length===2)return(w[0][0]+w[1].slice(0,2)).toUpperCase();return w.slice(0,3).map(w=>w[0]).join('').toUpperCase();}
function toName(id){return(id||'').replace(/:/g,'_').split('_').filter(w=>w).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
function short(n){if(typeof n!=='number'||isNaN(n))return'N/A';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n).toLocaleString();}
function full(n){return typeof n==='number'&&!isNaN(n)?Math.round(n).toLocaleString():'N/A';}
function stripMC(s){return(s||'').replace(/§./g,'').trim();}
function mcColorToHex(c){return({0:'#000',1:'#00A',2:'#0A0',3:'#0AA',4:'#A00',5:'#A0A',6:'#FA0',7:'#AAA',8:'#555',9:'#55F',a:'#5F5',b:'#5FF',c:'#F55',d:'#F5F',e:'#FF5',f:'#FFF'})[c]||null;}
function renderMCLore(raw){
  if(!raw)return'';
  const segs=[];let cur='#AAAAAA',bold=false,italic=false,i=0;
  while(i<raw.length){
    if(raw[i]==='§'&&i+1<raw.length){
      const code=raw[i+1].toLowerCase();
      const hex=mcColorToHex(code);
      if(hex){cur=hex;bold=false;italic=false;}
      else if(code==='l')bold=true;
      else if(code==='o')italic=true;
      else if(code==='r'){cur='#AAAAAA';bold=false;italic=false;}
      i+=2;
    }else{
      let j=i;while(j<raw.length&&raw[j]!=='§')j++;
      const txt=raw.slice(i,j);
      if(txt)segs.push({txt,color:cur,bold,italic});
      i=j;
    }
  }
  return segs.map(s=>`<span style="color:${s.color};${s.bold?'font-family:\'JetBrains Mono\',monospace;font-weight:600;font-size:16px;':''}${s.italic?'font-style:italic;':''}">${s.txt.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`).join('');
}
function estimateFill(id,qty=1){const p=products[id];if(!p)return'?';const d=(p.quick_status.movingWeek||0)/7;if(!d)return'?';const h=(qty/d)*24;if(h<0.017)return'<1m';if(h<1)return`~${Math.round(h*60)}m`;if(h<24)return`~${h.toFixed(1)}h`;return`~${(h/24).toFixed(1)}d`;}
function setStatus(msg,type='loading'){document.querySelector('#status .dot').className='dot'+(type==='ok'?' ok':type==='err'?' err':'');document.getElementById('status-text').textContent=msg;}

async function loadBazaar(){
  setStatus('Connecting to Hypixel...');
  try{
    const res=await fetch(WORKER+'/',{signal:AbortSignal.timeout(9000)});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(!data.success)throw new Error('API failure');
    products=data.products;
    updated=new Date(data.lastUpdated);
    items=Object.keys(products).map(id=>({id,name:toName(id)})).sort((a,b)=>a.name.localeCompare(b.name));
    const el=document.getElementById('search');
    el.disabled=false;el.placeholder='Search items...';
    setStatus(`${items.length.toLocaleString()} bazaar items loaded · ${updated.toLocaleTimeString()}`,'ok');
    renderMarket();
    loadSBItems();
  }catch(err){
    setStatus(`Failed: ${err.message}`,'err');
    document.getElementById('result').innerHTML=`<div class="empty-state"><span class="empty-icon">⚠</span>Couldn't reach the API.<br><button class="retry-btn" onclick="loadBazaar()">↻ Retry</button></div>`;
  }
}

async function loadSBItems(){
  try{
    const res=await fetch(WORKER+'/sb-items',{signal:AbortSignal.timeout(10000)});
    if(!res.ok)return;
    const data=await res.json();
    if(!data.success||!data.items)return;
    sbAllItems=data.items.map(i=>({id:i.id,name:stripMC(i.name)||toName(i.id),tier:i.tier||''}));
    const el=document.getElementById('search');
    el.placeholder=`Search ${items.length+sbAllItems.filter(i=>!products[i.id]).length} items...`;
  }catch(e){}
}

async function fetchNEU(id){
  if(id in neuCache)return neuCache[id];
  const baseId=id.includes(':')?id.split(':')[0]:id;
  for(const v of [baseId,id]){
    try{const res=await fetch(NEU_BASE+v+'.json',{signal:AbortSignal.timeout(5000)});if(res.ok){const d=await res.json();neuCache[id]=d;return d;}}catch{}
  }
  neuCache[id]=null;return null;
}

function cleanAHStats(history){
  if(!Array.isArray(history)||!history.length)return null;
  let pts=history.filter(d=>d.avg>0);if(!pts.length)return null;
  const sorted=[...pts].sort((a,b)=>a.avg-b.avg);
  const q1=sorted[Math.floor(sorted.length*.25)].avg,q3=sorted[Math.floor(sorted.length*.75)].avg,iqr=q3-q1;
  let clean=pts.filter(d=>d.avg>=q1-2*iqr&&d.avg<=q3+2*iqr);
  if(clean.length<2)clean=pts;
  const tv=clean.reduce((s,d)=>s+(d.volume||1),0);
  const wAvg=clean.reduce((s,d)=>s+d.avg*(d.volume||1),0)/tv;
  const ca=clean.map(d=>d.avg).sort((a,b)=>a-b);
  const mid=Math.floor(ca.length/2);
  const median=ca.length%2===0?(ca[mid-1]+ca[mid])/2:ca[mid];
  const p10=ca[Math.max(0,Math.floor(ca.length*.1))];
  const p90=ca[Math.min(ca.length-1,Math.floor(ca.length*.9))];
  return{avg:Math.round(wAvg),min:Math.round(Math.max(p10,wAvg*.2)),median:Math.round(median),max:Math.round(p90),
    volume:tv,buckets:clean.length,rawBuckets:pts.length,filtered:pts.length-clean.length,cleanPts:clean};
}

async function fetchAHPrice(id){
  if(ahPriceCache[id])return ahPriceCache[id];
  try{
    const r=await fetch(`${WORKER}/ah-history/${encodeURIComponent(id)}?period=day`,{signal:AbortSignal.timeout(7000)});
    if(r.ok){const h=await r.json();const s=cleanAHStats(h);if(s){ahPriceCache[id]=s;return s;}}
    const r2=await fetch(`${WORKER}/ah-price/${encodeURIComponent(id)}`,{signal:AbortSignal.timeout(5000)});
    if(r2.ok){const d=await r2.json();if(!d.min)d.min=d.avg;ahPriceCache[id]=d;return d;}
  }catch{}
  return null;
}

async function fetchAHHistory(id,period){
  try{const r=await fetch(`${WORKER}/ah-history/${encodeURIComponent(id)}?period=${period}`,{signal:AbortSignal.timeout(7000)});if(!r.ok)return null;return await r.json();}catch{return null;}
}

const ESSENCE_ICONS={WITHER:'💀',SPIDER:'🕷',UNDEAD:'☠',DRAGON:'🐉',GOLD:'✨',DIAMOND:'💎',ICE:'❄',CRIMSON:'🔥',DWARVEN:'⛏',JUNGLE:'🌿',WOODED:'🌲'};
const ESSENCE_COLORS={WITHER:'#aa44ff',SPIDER:'#886644',UNDEAD:'#55ff55',DRAGON:'#ff5555',GOLD:'#ffaa00',DIAMOND:'#55ffff',ICE:'#aaddff',CRIMSON:'#ff6600',DWARVEN:'#ffcc33',JUNGLE:'#55ff55',WOODED:'#8B6431'};
const MASTER_REQS=['Catacombs 24','Catacombs 27','Catacombs 30','Catacombs 33','Catacombs 36'];

function inferEssenceType(id,neu){
  const lore=Array.isArray(neu?.lore)?neu.lore.map(l=>stripMC(l).toLowerCase()).join(' '):'';
  const sid=id.toLowerCase();
  const combined=sid+' '+lore;
  if(/wither|necron|goldor|storm|maxor|shadow_fury|shadow fury|dark claymore|livid dagger/.test(combined))return'WITHER';
  if(/spider|tarantula/.test(combined))return'SPIDER';
  if(/revenant|zombie|rotten|undead|zombie_soldier/.test(combined))return'UNDEAD';
  if(/dragon|superior|strong|young|old|wise|protector|holy|unstable|ender|mastiff/.test(combined))return'DRAGON';
  if(/crimson|terror|hollow|aurora|fervor|magma/.test(combined))return'CRIMSON';
  if(/dwarven|mineral|gemstone|mithril|titanium/.test(combined))return'DWARVEN';
  if(/jungle|tiger/.test(combined))return'JUNGLE';
  if(/ice|frozen|crystal/.test(combined))return'ICE';
  if(/gold/.test(sid))return'GOLD';
  return null;
}

function parseSingleCostEntry(entry){
  let essAmt=0,coins=0,foundType=null;
  if(!entry)return{essAmt,coins,foundType};
  if(Array.isArray(entry)){
    for(const c of entry){
      if(!c||typeof c!=='object')continue;
      const t=String(c.type||c.essence_type||'').toUpperCase();
      const amt=c.amount||c.essence_amount||0;
      if(t==='COINS')coins+=amt;
      else if(t.includes('ESSENCE')){foundType=t.replace('ESSENCE_','').replace('_ESSENCE','');essAmt+=amt;}
      else if(t&&amt>0&&!foundType){foundType=t;essAmt+=amt;}
    }
  }else if(typeof entry==='object'){
    const t=String(entry.type||entry.essence_type||'').toUpperCase();
    const amt=entry.amount||entry.essence_amount||0;
    if(t==='COINS')coins=amt;
    else if(t.includes('ESSENCE')){foundType=t.replace('ESSENCE_','').replace('_ESSENCE','');essAmt=amt;}
    else if(t&&amt>0){foundType=t;essAmt=amt;}
    if(entry.coins)coins+=entry.coins;
  }
  return{essAmt,coins,foundType};
}

function parseEssenceData(neu,itemId){
  if(!neu)return null;
  let conversionStep=null;
  let starSteps=[];
  let essenceType=null;
  let isDungeon=false;

  const loreStr=Array.isArray(neu.lore)?neu.lore.map(l=>stripMC(l)).join(' '):'';
  if(loreStr.toLowerCase().includes('dungeon')||neu.dungeon_item_conversion_cost||neu.upgrade_costs)isDungeon=true;

  const conv=neu.dungeon_item_conversion_cost;
  if(conv&&typeof conv==='object'&&!Array.isArray(conv)){
    const rawType=String(conv.essence_type||conv.type||'').toUpperCase();
    const etype=rawType.replace('ESSENCE_','').replace('_ESSENCE','');
    if(etype&&etype!=='COINS'){
      essenceType=etype;
      conversionStep={essAmt:conv.amount||conv.essence_amount||0,coins:conv.coins||conv.gold_cost||0,label:'Convert to Dungeon Item'};
    }
  }

  const UPGRADE_KEYS=['upgrade_costs','item_upgrade_costs','star_upgrade_costs','dungeon_upgrade_costs','upgrade_cost'];
  let rawUpgrades=null;
  for(const k of UPGRADE_KEYS){
    if(Array.isArray(neu[k])&&neu[k].length){rawUpgrades=neu[k];break;}
  }

  if(rawUpgrades){
    for(const entry of rawUpgrades){
      const{essAmt,coins,foundType}=parseSingleCostEntry(entry);
      if(!essenceType&&foundType)essenceType=foundType;
      starSteps.push({essAmt,coins});
    }
  }

  if(!essenceType&&!conversionStep&&!starSteps.length){
    for(const key of Object.keys(neu)){
      const val=neu[key];
      if(!Array.isArray(val)||!val.length||UPGRADE_KEYS.includes(key))continue;
      if(key==='gemstone_slots'||key==='lore'||key==='recipes')continue;
      let looksLikeEssence=false;
      for(const entry of val.slice(0,3)){
        if(Array.isArray(entry)){
          for(const c of entry){
            if(c&&typeof c==='object'){
              const t=String(c.type||c.essence_type||'').toUpperCase();
              if(t.includes('ESSENCE')){looksLikeEssence=true;break;}
            }
          }
        }else if(entry&&typeof entry==='object'){
          const t=String(entry.type||entry.essence_type||'').toUpperCase();
          if(t.includes('ESSENCE')){looksLikeEssence=true;break;}
        }
        if(looksLikeEssence)break;
      }
      if(!looksLikeEssence)continue;
      for(const entry of val){
        const{essAmt,coins,foundType}=parseSingleCostEntry(entry);
        if(!essenceType&&foundType)essenceType=foundType;
        starSteps.push({essAmt,coins});
      }
      if(starSteps.length)break;
    }
  }

  if(!essenceType&&(starSteps.length||conversionStep)){
    essenceType=inferEssenceType(itemId||'',neu)||'UNKNOWN';
  }

  if(!essenceType&&!conversionStep&&!starSteps.length){
    if(isDungeon){
      const inferred=inferEssenceType(itemId||'',neu);
      if(inferred)return{essenceType:inferred,conversionStep:null,starSteps:[],noData:true};
    }
    return null;
  }

  return{essenceType:essenceType||'UNKNOWN',conversionStep,starSteps,isDungeon};
}

function detectFloorDrop(neu){
  if(!neu)return null;
  const lore=Array.isArray(neu.lore)?neu.lore:[];
  for(const line of lore){
    const s=stripMC(line);
    const m=s.match(/(?:Floor\s*(\d+)|F(\d+))/i);
    if(m)return parseInt(m[1]||m[2]);
    if(/Master\s*Mode/i.test(s))return'M';
    if(/boss\s*drop/i.test(s))return'boss';
  }
  return null;
}

const SLOT_KEYS=['A1','A2','A3','B1','B2','B3','C1','C2','C3'];

function parseRecipe(neu){
  const raw=neu?.recipe??neu?.recipes?.[0]??null;if(!raw)return null;
  const ro=(raw.A1!==undefined)?raw:(raw.recipe??null);if(!ro)return null;
  const slots=SLOT_KEYS.map(k=>{const v=(ro[k]||'').trim();if(!v||v==='null')return null;const p=v.split(':');const rawId=p[0];const n=parseInt(p[1])||0;if(!rawId)return null;return{id:rawId,qty:n>1?n:1};});
  const ingMap={};for(const s of slots){if(!s)continue;ingMap[s.id]=(ingMap[s.id]||0)+s.qty;}
  const text=stripMC(neu.crafttext||'');const m=text.match(/(\d+)x/);
  return{slots,ingMap,outQty:m?parseInt(m[1]):1};
}

function craftCost(ingMap,ahPrices={}){
  const r={};
  for(const[id,qty]of Object.entries(ingMap)){
    const p=products[id];
    if(p){const qs=p.quick_status;const ip=qs.buyPrice,op=p.sell_summary?.[0]?.pricePerUnit??qs.buyPrice;r[id]={qty,ip,op,iTotal:ip*qty,oTotal:op*qty,source:'bz'};}
    else if(ahPrices[id]){const ah=ahPrices[id];const ip=ah.min??ah.avg??null,op=ah.avg??ah.min??null;r[id]={qty,ip,op,iTotal:ip!=null?ip*qty:null,oTotal:op!=null?op*qty:null,source:'ah'};}
    else r[id]={qty,ip:null,op:null,iTotal:null,oTotal:null,source:'unknown'};
  }
  return r;
}

  const colCount=cols.length;
  const gridStyle=`grid-template-columns:repeat(${colCount},1fr)`;
  function compRow(label,vals,format=(v=>v!=null?short(v):'—')){
    const numVals=vals.filter(v=>v!=null&&typeof v==='number');
    const maxVal=numVals.length?Math.max(...numVals):null;
    const minVal=numVals.length?Math.min(...numVals):null;
    return`<div class="compare-grid" style="${gridStyle}">
      ${vals.map(v=>{
        const disp=format(v);
        let cls='same';
        if(v!=null&&typeof v==='number'&&numVals.length>1){
          if(v===maxVal&&maxVal!==minVal)cls='better';
          else if(v===minVal&&maxVal!==minVal)cls='worse';
        }
        return`<div class="compare-stat"><span class="compare-stat-lbl">${label}</span><span class="compare-stat-val ${cls}">${disp}</span></div>`;
      }).join('')}

  }
  const colHeaders=`<div class="compare-grid" style="${gridStyle}">

  const priceSection=`<div class="compare-grid" style="${gridStyle}"><div class="compare-section-lbl" style="grid-column:1/-1">💰 PRICES</div></div>`+
    compRow('Insta-Buy',cols.map(c=>c.priceInstaBuy),v=>v!=null?full(v)+'g':'—')+
    compRow('Buy Order / AH Avg',cols.map(c=>c.priceBuyOrder),v=>v!=null?full(v)+'g':'—')+
    compRow('Insta-Sell',cols.map(c=>c.priceInstaSell),v=>v!=null?full(v)+'g':'N/A (AH)')+
    compRow('7D Volume',cols.map(c=>c.vol),v=>v!=null?short(v):'N/A (AH)');
  const statsSection=allStatKeys.length?`<div class="compare-grid" style="${gridStyle}"><div class="compare-section-lbl" style="grid-column:1/-1">⚔ STATS</div></div>`+
    allStatKeys.map(k=>compRow(STAT_LABELS[k]||k.replace(/_/g,' '),cols.map(c=>c.stats[k]??null),v=>v!=null?(v>0?'+':'')+v:'—')).join(''):'';
  const essenceParsed=cols.map(c=>c.neu?parseEssenceData(c.neu,c.id):null);

      compRow('Total Stars',essenceParsed.map(p=>p&&!p.noData?p.starSteps.length:null))+
      compRow('Total Essence to Max',totals);
  })():'';
  result.innerHTML=`<div class="mc-panel compare-view">
    <div class="compare-view-header">
      <div class="compare-view-title">⚖ COMPARING ${compareList.length} ITEMS</div>
      <button class="compare-back" onclick="closeCompare()">← BACK</button>

function renderHistoryChart(canvasId,rawData,period,stats=null){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById(canvasId);if(!ctx)return;
  let cleanSet=null;
  if(stats?.cleanPts){cleanSet=new Set(stats.cleanPts.map(d=>d.time));}
  const labels=rawData.map(d=>{const dt=new Date(d.time);return period==='day'?dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):dt.toLocaleDateString([],{month:'short',day:'numeric'});});
  const avgClean=rawData.map(d=>(!cleanSet||cleanSet.has(d.time))?d.avg:null);
  const avgDirty=rawData.map(d=>(cleanSet&&!cleanSet.has(d.time))?d.avg:null);
  const minData=rawData.map(d=>(!cleanSet||cleanSet.has(d.time))?(d.min>0?d.min:null):null);
  const maxData=rawData.map(d=>(!cleanSet||cleanSet.has(d.time))?d.max:null);
  let datasets;
  if(cleanSet){
    datasets=[
      {label:'Max',data:maxData,borderColor:'rgba(255,85,85,0)',backgroundColor:'rgba(255,85,85,.06)',fill:'+1',tension:.3,pointRadius:0,borderWidth:0,spanGaps:true},
      {label:'Min',data:minData,borderColor:'rgba(85,255,85,0)',backgroundColor:'rgba(85,255,85,.06)',fill:false,tension:.3,pointRadius:0,borderWidth:0,spanGaps:true},
      {label:'Avg',data:avgClean,borderColor:'#ffaa00',backgroundColor:'rgba(255,170,0,.08)',fill:false,tension:.3,pointRadius:0,borderWidth:2.5,spanGaps:false},
      {label:'Outlier',data:avgDirty,borderColor:'transparent',backgroundColor:'rgba(255,85,85,.5)',pointRadius:rawData.map(d=>(cleanSet&&!cleanSet.has(d.time))?4:0),pointStyle:'crossRot',showLine:false},
    ];
  }else{
    datasets=[
      {label:'Avg',data:rawData.map(d=>d.avg),borderColor:'#ffaa00',backgroundColor:'rgba(255,170,0,.07)',fill:true,tension:.3,pointRadius:0,borderWidth:2},
      {label:'Min',data:rawData.map(d=>d.min>0?d.min:null),borderColor:'#55ff5566',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[4,4],spanGaps:true},
      {label:'Max',data:rawData.map(d=>d.max),borderColor:'#ff555566',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[4,4]},
    ];
  }
  chartInst=new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#16161a',borderColor:'#363639',borderWidth:1,titleColor:'#666',bodyColor:'#fff',padding:8,
      filter:item=>item.dataset.label!=='Outlier'||item.parsed.y!=null,
      callbacks:{label:c=>{if(c.parsed.y==null)return null;if(c.dataset.label==='Outlier')return`⚠ Outlier: ${short(c.parsed.y)}`;return`${c.dataset.label}: ${short(c.parsed.y)}`;}}
    }},
    scales:{x:{ticks:{color:'#444',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8,maxRotation:0},grid:{color:'rgba(0,0,0,.25)'}},
      y:{ticks:{color:'#444',font:{family:'JetBrains Mono',size:9},callback:v=>short(v)},grid:{color:'rgba(0,0,0,.25)'}}}
  }});
}

async function toggleCraftExpand(btn){
  const id=btn.dataset.expandId;
  const key=btn.dataset.expandKey;
  const depth=parseInt(btn.dataset.expandDepth);
  const tbody=document.getElementById('craft-tbody');
  if(!tbody)return;

  if(btn.classList.contains('open')){
    collapseRows(key,tbody);
    btn.classList.remove('open');
    btn.textContent='▶';
    return;
  }

  btn.textContent='...';
  btn.disabled=true;

  const MAX_DEPTH=8;
  if(depth>=MAX_DEPTH){btn.classList.add('none');btn.textContent='max';btn.disabled=true;return;}

  const neu=await fetchNEU(id);
  const recipe=neu?parseRecipe(neu):null;
  if(!recipe||!Object.keys(recipe.ingMap).length){
    btn.classList.add('none');btn.textContent='—';btn.disabled=true;return;
  }

  const ahIds=Object.keys(recipe.ingMap).filter(iid=>!products[iid]);
  if(ahIds.length){
    await Promise.all(ahIds.map(async iid=>{
      if(!ahPriceCache[iid]){const p=await fetchAHPrice(iid);if(p)ahPriceCache[iid]=p;}
    }));
  }

  const costs=craftCost(recipe.ingMap,ahPriceCache);
  const parentRow=tbody.querySelector(`[data-row-key="${key}"]`);
  if(!parentRow){btn.textContent='▶';btn.disabled=false;return;}

  let insertAfter=parentRow;
  const ingEntries=Object.entries(costs);
  ingEntries.forEach(([iid,c],idx)=>{
    const isLast=idx===ingEntries.length-1;
    const connector=depth===0?'':(isLast?'└ ':'├ ');
    const childKey=`${key}::${iid}::${depth+1}::${idx}`;
    const tr=document.createElement('tr');
    tr.outerHTML;
    const tmp=document.createElement('tbody');
    tmp.innerHTML=ingRowHTML(iid,c,depth+1,childKey,connector);
    const newRow=tmp.firstChild;
    newRow.dataset.parentKey=key;
    insertAfter.after(newRow);
    insertAfter=newRow;
  });

  btn.classList.add('open');
  btn.textContent='▼';
  btn.disabled=false;
}

function collapseRows(parentKey,tbody){
  const children=[...tbody.querySelectorAll(`[data-parent-key="${parentKey}"]`)];
  for(const child of children){
    const childKey=child.dataset.rowKey;
    if(childKey)collapseRows(childKey,tbody);
    child.remove();
  }
}

async function renderCrafting(id){
  const el=document.getElementById('craft-body');if(!el)return;
  if(craftCurrentId!==id){
    craftCurrentId=id;
    craftExpandState.clear();
  }
  el.className='craft-loading';el.textContent='Loading recipe data...';
  const neu=await fetchNEU(id);
  if(!neu){el.className='no-recipe';el.innerHTML='⛏ No item data found in NEU repo.';return;}
  const recipe=parseRecipe(neu);
  if(!recipe){el.className='no-recipe';el.innerHTML='⛏ This item has no crafting recipe.';return;}
  const{slots,ingMap,outQty}=recipe;
  const ahIngIds=Object.keys(ingMap).filter(iid=>!products[iid]);
  if(ahIngIds.length){
    el.textContent=`Loading recipe... (fetching ${ahIngIds.length} AH prices)`;
    await Promise.all(ahIngIds.map(async iid=>{if(!ahPriceCache[iid]){const p=await fetchAHPrice(iid);if(p)ahPriceCache[iid]=p;}}));
  }
  const costs=craftCost(ingMap,ahPriceCache);
  const dispName=stripMC(neu.displayname)||toName(id);
  let iTotal=0,oTotal=0,allKnown=true;
  for(const c of Object.values(costs)){if(c.iTotal!==null)iTotal+=c.iTotal;else allKnown=false;if(c.oTotal!==null)oTotal+=c.oTotal;}
  let sellI=null,sellO=null;
  if(products[id]){const p=products[id];sellI=p.quick_status.sellPrice*outQty;sellO=(p.buy_summary?.[0]?.pricePerUnit??p.quick_status.sellPrice)*outQty;}
  else{const ahp=await fetchAHPrice(id);if(ahp?.min!=null)sellI=ahp.min*outQty;if(ahp?.avg!=null)sellO=ahp.avg*outQty;}
  const oc=itemColor(id),oa=getAbbr(id);
  const outSlotHTML=`<div class="out-slot mc-slot" onclick="pick('${id}')" style="position:relative;background:${oc}18;border-color:${oc}66 ${oc}22 ${oc}22 ${oc}66;">
    <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <div class="slot-abbr" style="width:46px;height:46px;background:${oc}44;border:2px solid ${oc}88;display:flex;align-items:center;justify-content:center;color:${oc};font-size:13px;">${oa}</div>
      ${outQty>1?`<span class="slot-qty" style="font-size:13px">${outQty}</span>`:''}
    </div>
  </div>`;

  const ingRows=Object.entries(costs).map(([iid,c],idx)=>ingRowHTML(iid,c,0,`root::${iid}::0::${idx}`,'')).join('');

  function pCard(label,cost,sell,best=false){
    if(cost===null||sell===null)return`<div class="ps"><div class="ps-lbl">${label}</div><div class="ps-val" style="color:var(--muted2)">N/A</div></div>`;
    const profit=sell-cost,pct=cost>0?((profit/cost)*100).toFixed(1):'—',cls=profit>=0?'pos':'neg',sign=profit>=0?'+':'';
    return`<div class="ps">${best&&profit>0?'<span class="ps-best">BEST</span>':''}<div class="ps-lbl">${label}</div><div class="ps-val ${cls}">${sign}${short(profit)}</div><div class="ps-pct" style="color:${profit>=0?'var(--green)':'var(--red)'}">${sign}${pct}%</div></div>`;
  }

  const isBZ=!!products[id];
  const scenarios=[
    {label:isBZ?'Order mats → Insta-sell':'Order/AH → Min AH',cost:allKnown?oTotal:null,sell:sellI},
    {label:isBZ?'Order mats → Sell order':'Order/AH → Avg AH',cost:allKnown?oTotal:null,sell:sellO},
    {label:isBZ?'Insta-buy → Insta-sell':'Min BIN → Min AH',cost:allKnown?iTotal:null,sell:sellI},
    {label:isBZ?'Insta-buy → Sell order':'Min BIN → Avg AH',cost:allKnown?iTotal:null,sell:sellO},
  ];
  let bestIdx=-1,bestProfit=-Infinity;
  scenarios.forEach((s,i)=>{if(s.cost!==null&&s.sell!==null){const p=s.sell-s.cost;if(p>bestProfit){bestProfit=p;bestIdx=i;}}});

  const cpuI=outQty>1&&iTotal>0?`<span class="cpu-val">${short(iTotal/outQty)}g</span><span class="cpu-sep">/unit (insta)</span>`:'';
  const cpuO=outQty>1&&oTotal>0?`<span class="cpu-val" style="color:var(--green)">${short(oTotal/outQty)}g</span><span class="cpu-sep">/unit (order)</span>`:'';
  const cpuStrip=(outQty>1&&(iTotal>0||oTotal>0))?`<div class="cpu-strip"><span class="cpu-lbl">COST PER UNIT</span>${cpuI}${cpuI&&cpuO?'<span class="cpu-sep" style="opacity:.4">·</span>':''}${cpuO}</div>`:'';

  el.className='';
  el.innerHTML=`
    <div class="section-title" style="margin-bottom:16px">CRAFTING RECIPE — ${dispName.toUpperCase()}${outQty>1?` × ${outQty}`:''}</div>
    <div class="craft-grid-area">
      <div class="craft-grid" id="craft-grid-slots">${slots.map(s=>slotHTML(s)).join('')}</div>
      <div class="craft-arrow"><svg width="26" height="18" viewBox="0 0 26 18"><polygon points="0,4 15,4 15,0 26,9 15,18 15,14 0,14" fill="currentColor"/></svg>${outQty>1?`<span>×${outQty}</span>`:''}</div>
      ${outSlotHTML}
    </div>
    <div class="section-title" style="margin-bottom:0">INGREDIENTS <small style="font-size:5px;opacity:.6">▶ EXPAND SUB-RECIPE</small></div>
    <table class="ing-table">
      <thead><tr><th>ITEM</th><th class="r">QTY</th><th class="r">INSTA-BUY</th><th class="r">BUY ORDER</th><th class="r">FILL / EXP</th></tr></thead>
      <tbody id="craft-tbody">${ingRows}</tbody>
      <tfoot><tr><td colspan="2"><span class="total-lbl">TOTAL${!allKnown?' (PARTIAL)':''}</span></td><td class="cell-r"><span class="price-i" style="font-size:18px">${short(iTotal)}</span></td><td class="cell-r"><span class="price-o" style="font-size:18px">${short(oTotal)}</span></td><td></td></tr></tfoot>
    </table>
    <div class="profit-box">
      <div class="section-title" style="margin-bottom:0">PROFIT CALCULATOR</div>
      <div class="profit-grid">${scenarios.map((s,i)=>pCard(s.label,s.cost,s.sell,i===bestIdx)).join('')}</div>
      ${cpuStrip}
    </div>`;
  el.querySelectorAll('.g-slot.clickable').forEach(sl=>sl.addEventListener('click',()=>{const tid=sl.dataset.id;if(tid)pick(tid);}));
}

async function renderEssence(id){
  const el=document.getElementById('essence-body');if(!el)return;
  el.className='craft-loading';el.textContent='Loading essence data...';
  const neu=await fetchNEU(id);
  if(!neu){el.className='no-recipe';el.innerHTML='⛏ No item data found in NEU repo.';return;}

  const parsed=parseEssenceData(neu,id);

  if(!parsed){
    el.className='no-recipe';
    el.innerHTML=`⛏ No essence upgrade data found for this item.<br><small style="font-size:14px;color:var(--muted2)">Only dungeon items can be starred with essence.</small>`;
    return;
  }

  if(parsed.noData){
    const essCol=ESSENCE_COLORS[parsed.essenceType]||'#aaaaaa';
    const essIcon=ESSENCE_ICONS[parsed.essenceType]||'✨';
    el.className='';
    el.innerHTML=`<div class="dungeon-badge">🏰 <span>DUNGEON ITEM DETECTED</span></div>
    <div class="essence-header">
      <div class="essence-icon">${essIcon}</div>
      <div class="essence-meta">
        <div class="essence-type" style="color:${essCol}">${parsed.essenceType} ESSENCE</div>
        <div class="essence-sub">Upgrade cost data not in NEU repo for this item</div>
      </div>
    </div>
    <div class="ess-note">⚠ This item appears to use <strong style="color:${essCol}">${parsed.essenceType} Essence</strong> for upgrades, but the specific per-star costs weren't found in the NEU item database. Check the Hypixel SkyBlock wiki or in-game for exact costs.</div>`;
    return;
  }

  const{essenceType,conversionStep,starSteps}=parsed;
  const bzEssId=`ESSENCE_${essenceType}`;
  const essProduct=products[bzEssId]||null;
  const essInstaBuy=essProduct?.quick_status?.buyPrice??null;
  const essBuyOrder=essProduct?.sell_summary?.[0]?.pricePerUnit??essProduct?.quick_status?.buyPrice??null;
  const essCol=ESSENCE_COLORS[essenceType]||'#aaaaaa';
  const essIcon=ESSENCE_ICONS[essenceType]||'✨';
  const floorDrop=detectFloorDrop(neu);
  let floorHTML='';
  if(floorDrop!=null){
    const floorLabel=floorDrop==='M'?'Master Mode':floorDrop==='boss'?'Boss Drop':`Floor ${floorDrop}`;
    floorHTML=`<div class="floor-badge">🏰 <span>DROPS FROM: ${floorLabel.toUpperCase()}</span></div>`;
  }

  const hasConv=!!conversionStep;
  if(hasConv){
    floorHTML=`<div class="conv-badge">🔓 <span>CAN BE DUNGEONIZED</span></div>`+floorHTML;
  }else if(starSteps.length){
    floorHTML=`<div class="dungeon-badge">⭐ <span>DUNGEON ITEM — STAR UPGRADES</span></div>`+floorHTML;
  }

  const isMaster=starSteps.length>5;
  const baseStars=starSteps.slice(0,5);
  const masterStars=starSteps.slice(5);
  let cumEss=0,cumCostI=0,cumCostO=0;

  function buildStarHTML(stars,base){
    return stars.map((entry,idx)=>{
      const globalStar=base?idx+1:5+idx+1;
      const{essAmt,coins}=entry;
      cumEss+=essAmt;
      const rowCostI=essInstaBuy!=null?Math.round(essAmt*essInstaBuy+(coins||0)):null;
      const rowCostO=essBuyOrder!=null?Math.round(essAmt*essBuyOrder+(coins||0)):null;
      if(rowCostI!=null)cumCostI+=rowCostI;
      if(rowCostO!=null)cumCostO+=rowCostO;
      let starDisp='';
      for(let s=1;s<=10;s++){
        if(s>5){starDisp+=s<=globalStar?`<span class="star-master">✦</span>`:`<span class="star-plain">✦</span>`;}
        else{starDisp+=s<=globalStar?`<span class="star-gold">★</span>`:`<span class="star-plain">★</span>`;}
      }
      const reqLabel=!base&&idx<MASTER_REQS.length?`<span class="ess-req">${MASTER_REQS[idx]}</span>`:'<span class="ess-req" style="color:var(--muted2)">—</span>';
      return`<tr class="${!base?'master-star-row':''}">
        <td><div class="star-cell">${starDisp}</div></td>
        <td class="cell-r"><span class="ess-amt">${essAmt.toLocaleString()}</span>${(coins||0)>0?`<br><span style="font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace">${short(coins)}g</span>`:''}</td>
        <td class="cell-r">${rowCostI!=null?`<span class="ess-cost-i">${short(rowCostI)}</span>`:'<span class="price-na">—</span>'}</td>
        <td class="cell-r">${rowCostO!=null?`<span class="ess-cost-o">${short(rowCostO)}</span>`:'<span class="price-na">—</span>'}</td>
        <td class="cell-r"><span class="ess-cum">${cumEss.toLocaleString()}</span></td>
        <td class="cell-r">${reqLabel}</td>
      </tr>`;
    }).join('');
  }

  let convRow='';
  if(conversionStep){
    const essAmt=conversionStep.essAmt||0;
    const coins=conversionStep.coins||0;
    const ci=essInstaBuy!=null?Math.round(essAmt*essInstaBuy+coins):null;
    const co=essBuyOrder!=null?Math.round(essAmt*essBuyOrder+coins):null;
    cumEss+=essAmt;
    if(ci!=null)cumCostI+=ci;
    if(co!=null)cumCostO+=co;
    let starDisp='<span class="star-gold" style="font-size:14px">★</span>'+'<span class="star-plain" style="font-size:14px">★★★★★★★★★</span>';
    convRow=`<tr class="conv-row">
      <td><div class="star-cell">${starDisp}</div><div style="font-size:10px;color:var(--blue);font-family:'Press Start 2P',monospace;margin-top:3px">DUNGEONIZE</div></td>
      <td class="cell-r"><span class="ess-amt">${essAmt.toLocaleString()}</span>${coins>0?`<br><span style="font-size:12px;color:var(--gold);font-family:'JetBrains Mono',monospace">${short(coins)}g</span>`:''}</td>
      <td class="cell-r">${ci!=null?`<span class="ess-cost-i">${short(ci)}</span>`:'<span class="price-na">—</span>'}</td>
      <td class="cell-r">${co!=null?`<span class="ess-cost-o">${short(co)}</span>`:'<span class="price-na">—</span>'}</td>
      <td class="cell-r"><span class="ess-cum">${cumEss.toLocaleString()}</span></td>
      <td class="cell-r"><span class="ess-req">—</span></td>
    </tr>`;
  }

  const baseRows=buildStarHTML(baseStars,true);
  const masterRows=buildStarHTML(masterStars,false);
  const totalSteps=(conversionStep?1:0)+starSteps.length;

  el.className='';
  el.innerHTML=`
    ${floorHTML}
    <div class="essence-header">
      <div class="essence-icon">${essIcon}</div>
      <div class="essence-meta">
        <div class="essence-type" style="color:${essCol}">${essenceType} ESSENCE</div>
        <div class="essence-sub">${totalSteps} upgrade step${totalSteps!==1?'s':''}${hasConv?' · Includes dungeonization step':''}${isMaster?' · Base + Master stars':''}${starSteps.length&&!isMaster?' · Base stars only':''}</div>
      </div>
      ${essProduct?`<div class="essence-bz-price">
        <div class="essence-bz-label">BZ INSTA-BUY</div>
        <div class="essence-bz-val">${short(essInstaBuy)}<span style="font-size:12px;color:var(--gold);margin-left:3px">g</span></div>
        <div style="font-size:12px;color:var(--muted2);margin-top:1px">order: ${short(essBuyOrder)}g</div>
      </div>`:`<div class="essence-bz-price"><div class="essence-bz-label">BZ PRICE</div><div class="essence-bz-val" style="color:var(--gold)">AH ONLY</div></div>`}
    </div>
    ${!totalSteps?`<div class="ess-note" style="border-top:none">No per-star cost data found. The item uses ${essenceType} essence but star cost data wasn't in the NEU repo.</div>`:`
    <table class="essence-table">
      <thead><tr>
        <th>STARS</th>
        <th class="r">ESSENCE + COINS</th>
        <th class="r">INSTA-BUY COST</th>
        <th class="r">BUY ORDER COST</th>
        <th class="r">CUM. ESSENCE</th>
        <th class="r">REQUIREMENT</th>
      </tr></thead>
      <tbody>
        ${convRow}
        ${baseRows}
        ${masterRows.length?`<tr><td colspan="6" style="padding:5px 10px;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);letter-spacing:.1em;background:rgba(187,85,255,.07);border-top:2px solid rgba(187,85,255,.2);border-bottom:1px solid rgba(187,85,255,.2)">✦ MASTER STARS</td></tr>${masterRows}`:''}
      </tbody>
      <tfoot><tr>
        <td><span class="total-lbl">TOTAL TO MAX</span></td>
        <td class="cell-r"><span class="ess-amt">${cumEss.toLocaleString()}</span></td>
        <td class="cell-r"><span class="ess-cost-i" style="font-size:17px">${cumCostI>0?short(cumCostI):'N/A'}</span></td>
        <td class="cell-r"><span class="ess-cost-o" style="font-size:17px">${cumCostO>0?short(cumCostO):'N/A'}</span></td>
        <td class="cell-r"><span class="ess-cum">${cumEss.toLocaleString()}</span></td>
        <td></td>
      </tr></tfoot>
    </table>
    <div class="ess-note">${essProduct?`Live bazaar prices. <span style="color:var(--red)">Insta-buy</span> = pay immediately. <span style="color:var(--green)">Buy order</span> = wait for sellers to fill.`:`⚠ ${essenceType} essence is not on the bazaar — price it manually on the AH.`}${hasConv?' Dungeonize step required before starring.':''} Master star reqs are approximate.</div>`}`;
}

const STAT_LABELS_MAP={DAMAGE:'⚔ Damage',STRENGTH:'💪 Strength',CRIT_CHANCE:'🎯 Crit Chance',CRIT_DAMAGE:'💥 Crit Damage',ATTACK_SPEED:'⚡ Attack Speed',HEALTH:'❤ Health',DEFENSE:'🛡 Defense',SPEED:'👟 Speed',INTELLIGENCE:'🔮 Intelligence',SEA_CREATURE_CHANCE:'🐟 Sea Creature',MAGIC_FIND:'✨ Magic Find',PET_LUCK:'🍀 Pet Luck',FEROCITY:'🗡 Ferocity',ABILITY_DAMAGE:'🌀 Ability Dmg',MINING_SPEED:'⛏ Mining Speed',MINING_FORTUNE:'🍀 Mining Fortune',FARMING_FORTUNE:'🌾 Farming Fortune',FORAGING_FORTUNE:'🌲 Foraging Fortune',TRUE_DEFENSE:'🛡 True Defense',PRISTINE:'💎 Pristine'};
const GEM_COLORS_MAP={RUBY:'gem-ruby',SAPPHIRE:'gem-sapphire',AMBER:'gem-amber',AMETHYST:'gem-amethyst',JADE:'gem-jade',TOPAZ:'gem-topaz',JASPER:'gem-jasper',OPAL:'gem-opal',PERIDOT:'gem-peridot',AQUAMARINE:'gem-aquamarine',UNIVERSAL:'gem-universal',COMBAT:'gem-combat',DEFENSIVE:'gem-defensive',MINING:'gem-mining',SPEED:'gem-speed'};
const GEM_EMOJI_MAP={RUBY:'🔴',SAPPHIRE:'🔵',AMBER:'🟠',AMETHYST:'🟣',JADE:'🟢',TOPAZ:'🟡',JASPER:'🟤',OPAL:'⚪',PERIDOT:'🟩',AQUAMARINE:'🩵',UNIVERSAL:'⬜',COMBAT:'⚔',DEFENSIVE:'🛡',MINING:'⛏',SPEED:'💨'};

async function renderItemData(id){
  const el=document.getElementById('itemdata-body');if(!el)return;
  el.className='craft-loading';el.textContent='Loading item data...';
  const neu=await fetchNEU(id);
  if(!neu){el.className='no-recipe';el.innerHTML='⛏ No item data found in NEU repo.';return;}
  const sbItem=sbAllItems.find(i=>i.id===id);
  const tier=sbItem?.tier||neu.tier||'';
  const tierCol=tierColor(tier);
  const lore=Array.isArray(neu.lore)?neu.lore:[];
  const loreHTML=lore.map(line=>`<span class="lore-line">${renderMCLore(line)||'&nbsp;'}</span>`).join('');
  const stats=neu.stats||{};
  const statKeys=Object.keys(stats).filter(k=>stats[k]!==0);
  let statsHTML='';
  if(statKeys.length){
    statsHTML=`<div class="section-title" style="margin-bottom:8px">COMBAT STATS</div>
    <div class="item-stats-grid" style="margin-bottom:20px">
      ${statKeys.map(k=>{const v=stats[k];const isPos=v>0;const suffix=k.includes('CHANCE')||k.includes('SPEED')||k.includes('FORTUNE')&&k!=='MINING_SPEED'||k==='ABILITY_DAMAGE'?'%':'';return`<div class="stat-box"><div class="stat-box-label">${STAT_LABELS_MAP[k]||k.replace(/_/g,' ')}</div><div class="stat-box-val ${isPos?'pos':'neg'}">${isPos?'+':''}${v.toLocaleString()}${suffix}</div></div>`;}).join('')}
    </div>`;
  }
  const gemSlots=neu.gemstone_slots||[];
  let gemsHTML='';
  if(gemSlots.length){
    gemsHTML=`<div class="section-title" style="margin-bottom:8px">GEMSTONE SLOTS (${gemSlots.length})</div>
    <div class="gem-slots-wrap" style="margin-bottom:20px">
      ${gemSlots.map(slot=>{const type=(slot.slot_type||slot.type||'UNIVERSAL').toUpperCase();const cls=GEM_COLORS_MAP[type]||'gem-unknown';const emoji=GEM_EMOJI_MAP[type]||'💠';return`<div class="gem-slot-item"><div class="gem-slot ${cls}" title="${type}">${emoji}</div><span class="gem-slot-lbl">${type.slice(0,4)}</span></div>`;}).join('')}
    </div>`;
  }
  const reqs=[];
  const essData=parseEssenceData(neu,id);
  if(essData){
    if(essData.conversionStep)reqs.push({icon:'🔓',label:'Dungeonizable',val:'Has conversion step'});
    else if(!essData.noData)reqs.push({icon:'⭐',label:'Dungeon Item',val:`${essData.essenceType} Essence · ${essData.starSteps.length} stars`});
    else reqs.push({icon:'🏰',label:'Dungeon Item',val:`Uses ${essData.essenceType} Essence`});
  }
  const floorDrop=detectFloorDrop(neu);
  if(floorDrop!=null){const label=floorDrop==='M'?'Master Mode':floorDrop==='boss'?'Boss Drop':`Floor ${floorDrop}`;reqs.push({icon:'⚔',label:'Drops From',val:label});}
  if(neu.requirements){const r=neu.requirements;if(r.level)reqs.push({icon:'⚔',label:'Combat Level',val:`${r.level}`});if(r.skill)reqs.push({icon:'📊',label:'Skill',val:`${r.skill.type} ${r.skill.level}`});if(r.dungeon)reqs.push({icon:'🏰',label:'Dungeon',val:`${r.dungeon.type} Floor ${r.dungeon.level}`});if(r.slayer)reqs.push({icon:'☠',label:'Slayer',val:`${r.slayer.slayer_boss_type} ${r.slayer.level}`});}
  let reqsHTML='';
  if(reqs.length){reqsHTML=`<div class="section-title" style="margin-bottom:8px">REQUIREMENTS & INFO</div><div class="req-list mc-slot" style="margin-bottom:20px">${reqs.map(r=>`<div class="req-item"><span class="req-icon">${r.icon}</span><span class="req-label">${r.label}</span><span class="req-val">${r.val}</span></div>`).join('')}</div>`;}
  const soulbound=lore.some(l=>l.includes('SOULBOUND'));
  const badges=[];
  if(soulbound)badges.push(`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:#ff5555;border:1px solid #770000;padding:2px 6px;background:rgba(255,85,85,.08)">SOULBOUND</span>`);
  if(tier)badges.push(`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:${tierCol};border:1px solid ${tierCol}44;padding:2px 6px;background:${tierCol}11">${tier}</span>`);
  if(neu.museum)badges.push(`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--aqua);border:1px solid #336666;padding:2px 6px;background:rgba(85,255,255,.06)">MUSEUM</span>`);
  if(essData&&essData.conversionStep)badges.push(`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--blue);border:1px solid #334488;padding:2px 6px;background:rgba(85,153,255,.08)">DUNGEONIZABLE</span>`);
  if(essData&&!essData.conversionStep&&!essData.noData&&essData.starSteps.length)badges.push(`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);border:1px solid rgba(187,85,255,.3);padding:2px 6px;background:rgba(187,85,255,.08)">DUNGEON ITEM</span>`);
  el.className='';
  el.innerHTML=`
    ${badges.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 0 16px">${badges.join('')}</div>`:''}
    ${loreHTML?`<div class="section-title" style="margin-bottom:8px">LORE</div><div class="item-lore-box">${loreHTML}</div>`:''}
    ${reqsHTML}${statsHTML}${gemsHTML}
    ${!statKeys.length&&!loreHTML&&!reqsHTML&&!gemsHTML?'<div class="no-recipe">No detailed item data available.</div>':''}`;
}

async function doRefresh(){
  await loadBazaar();
  if(currentId){if(isBazaar(currentId))renderCard(currentId);else pick(currentId);}
}

function scoreItem(item,q){
  const n=item.name.toLowerCase(),id=(item.id||'').toLowerCase().replace(/_/g,' '),ql=q.toLowerCase().trim();
  if(n.startsWith(ql))return 100;if(n.includes(ql))return 80;if(id.includes(ql))return 70;
  const words=ql.split(/\s+/).filter(w=>w.length>=2);let hits=0;for(const w of words)if(n.includes(w)||id.includes(w))hits++;
  return words.length?(hits/words.length)*50:0;
}

function filterItems(q){
  if(!q.trim())return[];
  const bzIds=new Set(items.map(i=>i.id));
  const ahOnly=sbAllItems.filter(i=>!bzIds.has(i.id));
  return[...items,...ahOnly].map(i=>({i,s:scoreItem(i,q)})).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).slice(0,14).map(r=>r.i);
}

function renderDD(list,q){
  const dd=document.getElementById('dd');activeIdx=-1;
  if(!list.length){dd.innerHTML=`<div class="dd-empty">No results for "${q}"</div>`;dd.style.display='block';return;}
  dd.innerHTML=list.map((item,i)=>{
    const bz=!!products[item.id],qs=products[item.id]?.quick_status,price=qs?short(qs.sellPrice)+'g':'',col=itemColor(item.id);
    return`<div class="dd-item" data-id="${item.id}" data-i="${i}"><span class="dname"><span class="dd-px" style="background:${col};"></span>${item.name}</span><span class="dd-right">${price?`<span class="dprice">${price}</span>`:''}<span class="dd-type ${bz?'dd-bz':'dd-ah'}">${bz?'BZ':'AH'}</span></span></div>`;
  }).join('');
  dd.style.display='block';
  dd.querySelectorAll('.dd-item').forEach(el=>el.addEventListener('mousedown',e=>{e.preventDefault();pick(el.dataset.id);}));
}

function hideDD(){document.getElementById('dd').style.display='none';activeIdx=-1;}

function pick(id){
  const bazaarItem=items.find(i=>i.id===id),sbItem=sbAllItems.find(i=>i.id===id);
  document.getElementById('search').value=sbItem?.name||bazaarItem?.name||toName(id);
  currentId=id;currentTab='prices';hideDD();
  if(isBazaar(id))renderCard(id);else renderAHCard(id);
}

const searchEl=document.getElementById('search');
searchEl.addEventListener('input',()=>{const q=searchEl.value;if(!q.trim()){hideDD();return;}renderDD(filterItems(q),q);});
searchEl.addEventListener('keydown',e=>{
  const dd=document.getElementById('dd'),els=dd.querySelectorAll('.dd-item');if(!els.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,els.length-1);els.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));els[activeIdx]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,-1);els.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));}
  else if(e.key==='Enter'){const t=activeIdx>=0?els[activeIdx]:els[0];if(t)pick(t.dataset.id);}
  else if(e.key==='Escape')hideDD();
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))hideDD();});

loadBazaar();
</script>
